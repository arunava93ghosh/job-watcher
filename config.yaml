# ===========================================================================
# Job Watcher configuration
# ---------------------------------------------------------------------------
# After editing, commit this file on GitHub; the next run uses it.
# ===========================================================================
match_threshold: 70
experience_min_years: 5
experience_max_years: 7

# LinkedIn fallback (used for any company with `platform: linkedin`).
# IMPORTANT: LinkedIn often blocks automated requests from GitHub's servers,
# so these may return 0 from the scheduled run even when they work in your
# browser. Treat LinkedIn entries as BEST-EFFORT. The reliable long-term path
# for a company is a direct feed (see COMPANIES_STATUS.md).
linkedin_fallback_enabled: true
linkedin_location: "India"
linkedin_pages: 2

# ---------------------------------------------------------------------------
# COMPANIES   (platform values: pwc, deloitte, phenom, workday, greenhouse,
#              lever, ashby, smartrecruiters, linkedin)
# `verify: true` = best-guess from research, NOT yet confirmed live. Use the
# discovery tool on GitHub (COMPANIES_STATUS.md) to confirm/correct.
# ---------------------------------------------------------------------------
companies:

  # ===== Tier A: direct feeds (PwC & Deloitte LIVE; BCG & IQVIA researched) =====
  - name: PwC Acceleration Centres
    platform: pwc
    enabled: true

  - name: Deloitte USI
    platform: deloitte
    enabled: true

  - name: Boston Consulting Group
    platform: phenom
    phenom_domain: careers.bcg.com
    enabled: true
    verify: true

  - name: IQVIA
    platform: workday
    workday_tenant: iqvia
    workday_dc: wd1
    workday_site: IQVIA
    enabled: true
    verify: true

  # Accenture -> Workday (verified tenant accenture.wd103 / site AccentureCareers)
  - name: Accenture
    platform: workday
    workday_tenant: accenture
    workday_dc: wd103
    workday_site: AccentureCareers
    enabled: true
    verify: true

  # Marsh McLennan group -> Phenom at careers.marsh.com (covers Marsh, Mercer,
  # and Oliver Wyman). One feed; the LLM still matches each role to your CV.
  - name: Marsh McLennan (Marsh / Mercer / Oliver Wyman)
    platform: phenom
    phenom_domain: careers.marsh.com
    idns: marshmclennan
    enabled: true
    verify: true

  # ===== Tier B: LinkedIn fallback to start (upgrade to direct feeds later) =====
