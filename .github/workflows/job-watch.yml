name: job-watch

on:
  # Fired on time by an external scheduler (cron-job.org) via the GitHub API.
  workflow_dispatch: {}
  # Low-frequency safety net: if the external scheduler ever stops, GitHub still
  # runs this a few times a day on its own. (GitHub's own schedule can be late;
  # that's fine for a fallback.)
  schedule:
    - cron: "17 */6 * * *"   # roughly every 6 hours (UTC); :17 avoids the busy top-of-hour

permissions:
  contents: write              # needed so it can save seen.json back to the repo

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}

      - name: Save what it has seen
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add seen.json
          git commit -m "update seen jobs [skip ci]" || echo "no changes to commit"
          git push
