name: discover

# Manual only. Run this to see which companies' job feeds actually work
# (your build machine can't reach them, but GitHub's servers can). It fetches
# every enabled company and prints a PASS/FAIL + job-count table in the log.
# It does NOT email anything and does NOT change seen.json.
on:
  workflow_dispatch: {}

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python main.py --discover
